<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Border Control — Flag Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0D2B2E;
    --ink-2:#123A3D;
    --paper:#F1E9D8;
    --paper-2:#E7DCC3;
    --gold:#C9A227;
    --gold-2:#E3BE4B;
    --stamp-red:#A63D2F;
    --muted:#8FA9A6;
    --text:#F1E9D8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(201,162,39,0.08), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(166,61,47,0.08), transparent 40%),
      var(--ink);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{ width:100%; max-width:520px; }

  .masthead{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
    padding:0 4px;
  }
  .masthead h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:26px;
    margin:0;
    letter-spacing:0.3px;
  }
  .masthead .doc-code{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .stamps-row{
    display:flex;
    gap:6px;
    margin-bottom:14px;
    min-height:22px;
    flex-wrap:wrap;
  }
  .stamp-dot{
    width:18px; height:18px;
    border-radius:50%;
    border:2px solid var(--muted);
    opacity:0.35;
    flex-shrink:0;
  }
  .stamp-dot.filled{
    border-color:var(--gold);
    background:rgba(201,162,39,0.18);
    opacity:1;
  }

  .passport{
    background:var(--paper);
    border-radius:6px;
    position:relative;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
    border:1px solid rgba(0,0,0,0.08);
  }
  .passport::before{
    content:'';
    position:absolute;
    inset:10px;
    border:1px solid rgba(13,43,46,0.15);
    border-radius:3px;
    pointer-events:none;
  }

  .panel-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 24px 0;
    color:var(--ink);
  }
  .panel-top .label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:rgba(13,43,46,0.55);
  }
  .panel-top .score{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    color:var(--ink);
  }

  .flag-stage{
    margin:20px 24px 6px;
    aspect-ratio: 3 / 2;
    border-radius:4px;
    overflow:hidden;
    background:var(--paper-2);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    box-shadow: inset 0 0 0 1px rgba(13,43,46,0.12);
  }
  .flag-stage img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .stamp-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    opacity:0;
  }
  .stamp-overlay.show{
    animation: stampIn 0.45s cubic-bezier(.2,1.6,.4,1) forwards;
  }
  @keyframes stampIn{
    0%{ opacity:0; transform:scale(2.2) rotate(-18deg); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:scale(1) rotate(-10deg); }
  }
  .stamp-text{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:3px;
    padding:10px 20px;
    border:3px solid;
    border-radius:4px;
    text-transform:uppercase;
  }
  .stamp-text.ok{ color:#2F6E4E; border-color:#2F6E4E; background:rgba(47,110,78,0.08); }
  .stamp-text.no{ color:var(--stamp-red); border-color:var(--stamp-red); background:rgba(166,61,47,0.08); }

  .question-text{
    font-family:'Fraunces', serif;
    font-size:17px;
    color:var(--ink);
    margin:16px 24px 4px;
  }

  .options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:12px 24px 22px;
  }
  .opt{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(13,43,46,0.03);
    border:1px solid rgba(13,43,46,0.18);
    border-radius:4px;
    padding:12px 12px;
    cursor:pointer;
    font-family:'Inter', sans-serif;
    font-size:14px;
    color:var(--ink);
    text-align:left;
    transition:background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .opt:hover{ background:rgba(13,43,46,0.07); }
  .opt:active{ transform:scale(0.98); }
  .opt .letter{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:12px;
    color:var(--muted-ink, #6b6b5e);
    border:1px solid rgba(13,43,46,0.25);
    border-radius:3px;
    width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .opt.correct{ background:rgba(47,110,78,0.14); border-color:#2F6E4E; }
  .opt.wrong{ background:rgba(166,61,47,0.14); border-color:var(--stamp-red); }
  .opt.disabled{ pointer-events:none; opacity:0.55; }
  .opt.correct .letter, .opt.wrong .letter{ opacity:0.6; }

  .footer-strip{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 24px 16px;
    border-top:1px dashed rgba(13,43,46,0.18);
  }
  .footer-strip .hint{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:rgba(13,43,46,0.5);
    letter-spacing:0.5px;
  }
  .next-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:4px;
    padding:9px 16px;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.2s;
  }
  .next-btn.show{ opacity:1; }

  .results{
    padding:36px 28px 30px;
    text-align:center;
    color:var(--ink);
  }
  .results h2{
    font-family:'Fraunces', serif;
    font-size:28px;
    margin:0 0 6px;
  }
  .results .sub{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:rgba(13,43,46,0.55);
    margin-bottom:24px;
    letter-spacing:0.5px;
  }
  .big-score{
    font-family:'Fraunces', serif;
    font-size:64px;
    font-weight:700;
    color:var(--gold-2);
    -webkit-text-stroke:1.5px var(--ink);
    line-height:1;
    margin-bottom:6px;
  }
  .big-score-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:rgba(13,43,46,0.6);
    margin-bottom:26px;
  }
  .missed-list{
    text-align:left;
    background:rgba(13,43,46,0.04);
    border-radius:4px;
    padding:14px 16px;
    margin-bottom:24px;
    max-height:160px;
    overflow-y:auto;
  }
  .missed-list .row{
    font-size:13px;
    padding:4px 0;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid rgba(13,43,46,0.08);
  }
  .missed-list .row:last-child{ border-bottom:none; }
  .missed-list .row .miss-name{ color:var(--ink); }
  .missed-list .row .miss-correct{ color:#2F6E4E; font-family:'JetBrains Mono', monospace; font-size:12px; }
  .missed-empty{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:rgba(13,43,46,0.5);
    padding:8px 0;
  }
  .replay-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:4px;
    padding:12px 26px;
    cursor:pointer;
  }
  .replay-btn:hover{ background:#0a2224; }

  @media (max-width:420px){
    .options{ grid-template-columns:1fr; }
    .big-score{ font-size:52px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <h1>Border Control</h1>
    <div class="doc-code">FLAG-QUIZ · NO. 0126</div>
  </div>

  <div class="stamps-row" id="stampsRow"></div>

  <div class="passport" id="passport"></div>
</div>

<script>
const COUNTRIES = [
  ["us","United States"],["gb","United Kingdom"],["fr","France"],["de","Germany"],
  ["it","Italy"],["es","Spain"],["pt","Portugal"],["nl","Netherlands"],
  ["be","Belgium"],["ch","Switzerland"],["at","Austria"],["se","Sweden"],
  ["no","Norway"],["dk","Denmark"],["fi","Finland"],["ie","Ireland"],
  ["pl","Poland"],["gr","Greece"],["tr","Turkey"],["ru","Russia"],
  ["ua","Ukraine"],["cz","Czechia"],["hu","Hungary"],["ro","Romania"],
  ["jp","Japan"],["cn","China"],["kr","South Korea"],["in","India"],
  ["id","Indonesia"],["th","Thailand"],["vn","Vietnam"],["ph","Philippines"],
  ["my","Malaysia"],["sg","Singapore"],["pk","Pakistan"],["bd","Bangladesh"],
  ["sa","Saudi Arabia"],["ae","United Arab Emirates"],["il","Israel"],["ir","Iran"],
  ["eg","Egypt"],["za","South Africa"],["ng","Nigeria"],["ke","Kenya"],
  ["ma","Morocco"],["gh","Ghana"],["et","Ethiopia"],["dz","Algeria"],
  ["br","Brazil"],["ar","Argentina"],["mx","Mexico"],["ca","Canada"],
  ["co","Colombia"],["cl","Chile"],["pe","Peru"],["cu","Cuba"],
  ["au","Australia"],["nz","New Zealand"],["fj","Fiji"],
  ["is","Iceland"],["lu","Luxembourg"],["mt","Malta"],["cy","Cyprus"],
  ["hr","Croatia"],["rs","Serbia"],["bg","Bulgaria"],["sk","Slovakia"],
  ["si","Slovenia"],["ee","Estonia"],["lv","Latvia"],["lt","Lithuania"],
  ["kw","Kuwait"],["qa","Qatar"],["jo","Jordan"],["lb","Lebanon"],
  ["np","Nepal"],["lk","Sri Lanka"],["mm","Myanmar"],["kh","Cambodia"],
  ["mn","Mongolia"],["kz","Kazakhstan"],["uz","Uzbekistan"],["af","Afghanistan"],
  ["tz","Tanzania"],["ug","Uganda"],["zm","Zambia"],["zw","Zimbabwe"],
  ["sn","Senegal"],["ci","Ivory Coast"],["cm","Cameroon"],["mz","Mozambique"],
  ["ec","Ecuador"],["bo","Bolivia"],["py","Paraguay"],["uy","Uruguay"],
  ["ve","Venezuela"],["cr","Costa Rica"],["pa","Panama"],["jm","Jamaica"]
];
const TOTAL_ROUNDS = 15;

let round = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let missed = [];
let currentCorrect = "";
let answered = false;
let pool = [];
let gameQueue = [];

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function flagUrl(code){
  return `https://flagcdn.com/w320/${code}.png`;
}

function renderStamps(){
  const row = document.getElementById('stampsRow');
  row.innerHTML = '';
  for(let i=0;i<TOTAL_ROUNDS;i++){
    const d = document.createElement('div');
    d.className = 'stamp-dot' + (i < round ? ' filled' : '');
    row.appendChild(d);
  }
}

function newRound(){
  answered = false;
  round++;
  if(round > TOTAL_ROUNDS){ renderResults(); return; }

  const correctEntry = gameQueue[round-1];
  const distractorPool = pool.filter(c => c[0] !== correctEntry[0]);
  const distractors = shuffle(distractorPool).slice(0,3);
  const set = shuffle([correctEntry, ...distractors]);
  currentCorrect = correctEntry[1];
  const correctCode = correctEntry[0];

  renderStamps();

  const passport = document.getElementById('passport');
  passport.innerHTML = `
    <div class="panel-top">
      <span class="label">Republic of Vexillology</span>
      <span class="score">SCORE ${score}/${TOTAL_ROUNDS} · STREAK ${streak}</span>
    </div>
    <div class="flag-stage">
      <img src="${flagUrl(correctCode)}" alt="Flag to identify">
      <div class="stamp-overlay" id="stampOverlay"><div class="stamp-text" id="stampText"></div></div>
    </div>
    <div class="question-text">No. ${round} of ${TOTAL_ROUNDS} — which country does this flag belong to?</div>
    <div class="options" id="optionsRow"></div>
    <div class="footer-strip">
      <span class="hint" id="footerHint">SELECT AN ANSWER TO CONTINUE</span>
      <button class="next-btn" id="nextBtn">Next →</button>
    </div>
  `;

  const optionsRow = document.getElementById('optionsRow');
  const letters = ['A','B','C','D'];
  set.forEach((c, i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${c[1]}</span>`;
    btn.addEventListener('click', ()=> selectAnswer(c[1], btn));
    optionsRow.appendChild(btn);
  });

  document.getElementById('nextBtn').addEventListener('click', newRound);
}

function selectAnswer(chosen, btnEl){
  if(answered) return;
  answered = true;

  const isCorrect = chosen === currentCorrect;
  document.querySelectorAll('.opt').forEach(b=>{
    b.classList.add('disabled');
    const label = b.querySelector('span:last-child').textContent;
    if(label === currentCorrect) b.classList.add('correct');
  });
  if(!isCorrect) btnEl.classList.add('wrong');

  const overlay = document.getElementById('stampOverlay');
  const stampText = document.getElementById('stampText');
  if(isCorrect){
    score++;
    streak++;
    bestStreak = Math.max(bestStreak, streak);
    stampText.textContent = 'Approved';
    stampText.className = 'stamp-text ok';
  } else {
    streak = 0;
    missed.push([chosen, currentCorrect]);
    stampText.textContent = 'Denied';
    stampText.className = 'stamp-text no';
  }
  overlay.classList.add('show');

  document.getElementById('footerHint').textContent = isCorrect
    ? 'CORRECT — WELCOME TO THE COUNTRY'
    : `INCORRECT — CORRECT ANSWER: ${currentCorrect.toUpperCase()}`;
  document.getElementById('nextBtn').classList.add('show');
}

function renderResults(){
  const passport = document.getElementById('passport');
  const pct = Math.round((score/TOTAL_ROUNDS)*100);
  let title, sub;
  if(pct === 100){ title = 'Diplomatic passport'; sub = 'Perfect record — full visa-free access.'; }
  else if(pct >= 80){ title = 'Frequent flyer'; sub = 'You know your flags cold.'; }
  else if(pct >= 60){ title = 'Seasoned traveler'; sub = 'Solid instincts, a few stamps missing.'; }
  else if(pct >= 40){ title = 'Tourist visa'; sub = 'You know the classics — time to explore further.'; }
  else { title = 'First-time traveler'; sub = 'Every expert started at the customs desk.'; }

  let missedHtml = '';
  if(missed.length === 0){
    missedHtml = '<div class="missed-empty">No misses on this trip — clean record.</div>';
  } else {
    missedHtml = missed.map(([your, correct]) =>
      `<div class="row"><span class="miss-name">You said: ${your}</span><span class="miss-correct">${correct}</span></div>`
    ).join('');
  }

  passport.innerHTML = `
    <div class="results">
      <div class="big-score">${score}/${TOTAL_ROUNDS}</div>
      <div class="big-score-label">BEST STREAK: ${bestStreak}</div>
      <h2>${title}</h2>
      <div class="sub">${sub}</div>
      <div class="missed-list">${missedHtml}</div>
      <button class="replay-btn" id="replayBtn">Book another trip</button>
    </div>
  `;
  document.getElementById('replayBtn').addEventListener('click', startGame);
}

function startGame(){
  round = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;
  missed = [];
  pool = COUNTRIES;
  gameQueue = shuffle(COUNTRIES).slice(0, TOTAL_ROUNDS);
  renderStamps();
  newRound();
}

startGame();
</script>
</body>
</html>
